<!-- Logo discreto no canto superior direito -->
<div style="
  position: fixed; 
  top: 24px; 
  right: 24px; 
  z-index: 9999;
">
  <img 
    src="logo-oren.png" 
    alt="Logo Oren Consultoria" 
    style="
      width: 110px;
      max-width: 22vw;
      height: auto;
      opacity: 0.92;
      background: rgba(255, 255, 255, 0.78);
      padding: 10px 12px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: transform 0.2s ease, opacity 0.2s ease;
    "
    onmouseover="this.style.opacity='1'; this.style.transform='scale(1.03)'"
    onmouseout="this.style.opacity='0.92'; this.style.transform='scale(1)'"
  >
</div>
